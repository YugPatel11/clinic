<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Aarogya Medical</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pure-white': '#FFFFFF',
                        'silver-light': '#EDEEEB',
                        'heather-gray': '#CCC7BF',
                        'dark-night': '#31393C',
                        'electric-blue': '#3E96F4'
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #F4F5F2;
            background-image: radial-gradient(ellipse at 0% 0%, rgba(62,150,244,0.04) 0%, transparent 50%), radial-gradient(ellipse at 100% 100%, rgba(62,150,244,0.03) 0%, transparent 50%);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .font-playfair { font-family: 'Playfair Display', serif; }
        .input-modern {
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
            border: 1.5px solid #E0DDD9;
            background: #FAFAF8;
        }
        .input-modern:hover { border-color: #CCC7BF; }
        .input-modern:focus {
            border-color: #3E96F4;
            box-shadow: 0 0 0 3px rgba(62,150,244,0.12);
            outline: none;
            background: #fff;
        }
        .btn-shine {
            position: relative; overflow: hidden;
            transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
        }
        .btn-shine:hover {
            box-shadow: 0 8px 24px -4px rgba(62,150,244,0.3);
            transform: translateY(-1px);
        }
        .btn-shine:active { transform: translateY(0); }
        .btn-shine::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.12), transparent);
            transform: rotate(30deg); transition: all 0.6s;
        }
        .btn-shine:hover::after { left: 100%; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeInUp 0.5s cubic-bezier(0.22,1,0.36,1) forwards; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        .float-anim { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6 selection:bg-electric-blue selection:text-white">

    <!-- Subtle background shapes -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-20 left-20 w-72 h-72 bg-electric-blue/5 rounded-full blur-3xl float-anim"></div>
        <div class="absolute bottom-20 right-20 w-96 h-96 bg-[#3E96F4]/5 rounded-full blur-3xl float-anim" style="animation-delay: 2s;"></div>
    </div>

    <div class="max-w-md w-full animate-in relative z-10">
        <div class="bg-white/95 backdrop-blur-xl p-10 rounded-[2rem] shadow-[0_24px_48px_-12px_rgba(0,0,0,0.08)] border border-[#E8E6E3]">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-[#3E96F4] to-[#2b82dc] rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-lg shadow-electric-blue/20">
                    <i data-lucide="heart-pulse" class="text-white w-8 h-8"></i>
                </div>
                <h1 class="text-2xl font-bold text-dark-night mb-1">
                    <span>Aarogya</span> <span class="font-light text-electric-blue">Medical</span>
                </h1>
                <p class="text-heather-gray mt-2 text-sm font-medium">Please sign in to access the portal</p>
            </div>

            {% if form.errors %}
            <div class="bg-red-50/80 border border-red-200/60 text-red-600 p-3 rounded-xl mb-5 text-sm font-medium flex items-center gap-2">
                <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i>
                Invalid username or password. Please try again.
            </div>
            {% endif %}

            <form method="POST" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-xs font-bold text-dark-night mb-1.5">Username</label>
                    <input type="text" name="username" required class="w-full px-4 py-3 rounded-xl input-modern bg-silver-light/50 text-sm font-medium placeholder-gray-300" placeholder="Enter your username">
                </div>
                <div>
                    <label class="block text-xs font-bold text-dark-night mb-1.5">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-3 rounded-xl input-modern bg-silver-light/50 text-sm font-medium placeholder-gray-300" placeholder="Enter your password">
                </div>
                <button type="submit" class="w-full bg-[#3E96F4] text-white py-3.5 rounded-xl mt-2 font-bold text-sm btn-shine">
                    Sign In
                </button>
            </form>
        </div>
        <p class="text-center text-xs text-heather-gray mt-6 font-medium">© 2026 Aarogya Medical. All rights reserved.</p>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
