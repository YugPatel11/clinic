<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Suspended | Aarogya Medical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #FDFBF7; }
        .font-playfair { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-[0_20px_40px_-15px_rgba(44,62,58,0.05)] border border-red-100 text-center relative overflow-hidden">
        <i data-lucide="shield-alert" class="absolute -right-10 -top-10 w-40 h-40 text-red-50 opacity-50 z-0"></i>
        
        <div class="relative z-10">
            <div class="w-20 h-20 bg-red-50 border border-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="lock" class="text-red-500 w-10 h-10"></i>
            </div>
            
            <h1 class="text-3xl font-playfair text-[#2C3E3A] mb-3">Service Suspended</h1>
            
            <p class="text-gray-500 text-sm leading-relaxed mb-8">
                Your clinic's access to the Aarogya Medical portal has been temporarily paused. Please contact your system administrator to reactivate your account.
            </p>
            
            <div class="bg-gray-50 rounded-xl p-4 border border-gray-100">
                <p class="text-xs text-gray-400 uppercase tracking-widest font-medium">Error Code</p>
                <p class="text-[#2C3E3A] font-mono text-sm mt-1">ERR_SUBSCRIPTION_INACTIVE</p>
            </div>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
