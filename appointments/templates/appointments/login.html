<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Aarogya Medical</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pure-white': '#FFFFFF',
                        'silver-light': '#F1F5F9',
                        'heather-gray': '#64748B',
                        'dark-night': '#0F172A',
                        'electric-blue': '#6366F1'
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F8FAFC;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(14, 165, 233, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(99, 102, 241, 0.15) 0px, transparent 50%);
            background-size: 200% 200%;
            animation: meshBG 15s ease infinite;
            color: #0F172A;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        @keyframes meshBG {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        .input-modern {
            background: #F8FAFC;
            border: 2px solid #E2E8F0;
            border-radius: 16px;
            transition: all 0.3s ease;
            color: #0F172A;
        }
        .input-modern:focus {
            background: #FFFFFF;
            border-color: #6366F1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            outline: none;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366F1, #0EA5E9);
            background-size: 200% auto;
            color: white;
            border-radius: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            position: relative;
            overflow: hidden;
        }
        .btn-primary:hover {
            background-position: right center;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }
        .btn-primary:active { transform: translateY(0); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        .animate-in { opacity: 0; animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        .float-anim { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6 selection:bg-electric-blue selection:text-white">

    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-20 left-20 w-72 h-72 bg-electric-blue/10 rounded-full blur-3xl float-anim"></div>
        <div class="absolute bottom-20 right-20 w-96 h-96 bg-[#0EA5E9]/10 rounded-full blur-3xl float-anim" style="animation-delay: 2s;"></div>
    </div>

    <div class="max-w-md w-full animate-in relative z-10">
        <div class="bg-white/85 backdrop-blur-xl p-10 rounded-[2rem] shadow-[0_24px_48px_-12px_rgba(0,0,0,0.08)] border border-white">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-[#6366F1] to-[#0EA5E9] rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-lg shadow-electric-blue/30">
                    <i data-lucide="heart-pulse" class="text-white w-8 h-8"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-dark-night mb-1">
                    <span>Aarogya</span> <span class="font-light text-electric-blue">Medical</span>
                </h1>
                <p class="text-heather-gray mt-2 text-sm font-bold uppercase tracking-wide">Please sign in to access</p>
            </div>

            {% if form.errors %}
            <div class="bg-red-50/80 border border-red-200/60 text-red-600 p-3 rounded-xl mb-5 text-sm font-bold flex items-center gap-2">
                <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i>
                Invalid username or password. Please try again.
            </div>
            {% endif %}

            <form method="POST" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-xs font-bold text-dark-night mb-1.5 uppercase tracking-wide">Username</label>
                    <input type="text" name="username" required class="w-full px-4 py-3.5 rounded-xl input-modern text-sm font-bold placeholder-gray-400" placeholder="Enter your username">
                </div>
                <div>
                    <label class="block text-xs font-bold text-dark-night mb-1.5 uppercase tracking-wide">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-3.5 rounded-xl input-modern text-sm font-bold placeholder-gray-400" placeholder="Enter your password">
                </div>
                <button type="submit" class="w-full btn-primary py-4 mt-4 text-sm">
                    Sign In to Dashboard
                </button>
            </form>
        </div>
        <p class="text-center text-xs text-heather-gray mt-6 font-medium">© 2026 Aarogya Medical. All rights reserved.</p>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
